name: 🔄 Mise à jour automatique des financements

on:
  schedule:
    # Tous les lundis à 7h00 UTC
    - cron: '0 7 * * 1'
  workflow_dispatch:
    # Déclenchement manuel depuis l'onglet Actions

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Installation Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installation des dépendances
        run: pip install -r scripts/requirements.txt

      - name: Exécution du script de veille
        run: python scripts/scraper.py

      - name: Commit et push automatique
        run: |
          git config user.name  "GrantMatch Bot"
          git config user.email "grantmatch-bot@users.noreply.github.com"
          git add discovered.json grants.json
          git diff --staged --quiet && echo "Rien à committer" || \
            git commit -m "🤖 Mise à jour automatique $(date +'%Y-%m-%d')" && git push
